services:
  kafka:
    image: apache/kafka:3.9.0
    container_name: tarea3_kafka
    ports:
      - "${KAFKA_PORT_HOST:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # Host vacío (://:puerto) = bind a todas las interfaces

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7.4-alpine
    container_name: tarea1_redis
    command: >
      redis-server
      --maxmemory ${REDIS_MAXMEMORY:-200mb}
      --maxmemory-policy ${REDIS_POLICY_NATIVE:-allkeys-lru}
      --maxmemory-samples 10
      --save ""
      --appendonly no
    ports:
      - "${REDIS_PORT_HOST:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  response_generator:
    build: ./response_generator
    container_name: tarea1_response_gen
    environment:
      DATA_PATH: /data/santiago_buildings.parquet
      SIM_LATENCY_MIN_MS: ${SIM_LATENCY_MIN_MS:-30}
      SIM_LATENCY_MAX_MS: ${SIM_LATENCY_MAX_MS:-120}
    volumes:
      - ./data:/data:ro
    ports:
      - "8002:8002"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  cache_service:
    build: ./cache_service
    container_name: tarea1_cache_svc
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RESPONSE_GEN_URL: http://response_generator:8002
      METRICS_URL: http://metrics:8003
      CACHE_POLICY: ${CACHE_POLICY:-LRU}
      CACHE_TTL_SEC: ${CACHE_TTL_SEC:-300}
      TTL_Q1: ${TTL_Q1:-300}
      TTL_Q2: ${TTL_Q2:-300}
      TTL_Q3: ${TTL_Q3:-180}
      TTL_Q4: ${TTL_Q4:-120}
      TTL_Q5: ${TTL_Q5:-600}
    ports:
      - "8001:8001"
    depends_on:
      redis:
        condition: service_healthy
      response_generator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================ #
  # Grupo de consumidores Puente Kafka<->HTTP:
  # consume consultas_principales + consultas_reintentos
  # deiega a cache_service y enruta fallas a reintentos/DLQ
  # Escalable: docker compose up -d --scale consumer=N
  # (sin container_name ni puerto al host para permitir réplicas)
  # ============================================================ #
  consumer:
    build: ./consumer
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      CACHE_URL: http://cache_service:8001
      METRICS_URL: http://metrics:8003
      CONSUMER_GROUP: cache-consumers
      MAX_RETRIES: ${MAX_RETRIES:-3}
      RETRY_DELAY_MS: ${RETRY_DELAY_MS:-1000}
      TOPIC_MAIN: consultas_principales
      TOPIC_RETRY: consultas_reintentos
      TOPIC_DLQ: consultas_dlq
      PARTITIONS_MAIN: ${PARTITIONS_MAIN:-6}
    depends_on:
      kafka:
        condition: service_healthy
      cache_service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  metrics:
    build: ./metrics_service
    container_name: tarea1_metrics
    environment:
      LATENCY_WINDOW: 5000
      SNAPSHOT_DIR: /snapshots
      CACHE_STATS_URL: http://cache_service:8001/stats
      KAFKA_BOOTSTRAP: kafka:9092
      CONSUMER_GROUP: cache-consumers
      TOPIC_MAIN: consultas_principales
      TOPIC_RETRY: consultas_reintentos
      TOPIC_DLQ: consultas_dlq
    volumes:
      - ./snapshots:/snapshots
    ports:
      - "8003:8003"
    depends_on:
      cache_service:
        condition: service_healthy
      kafka:
        condition: service_healthy

  traffic_generator:
    build: ./traffic_generator
    container_name: tarea1_traffic_gen
    environment:
      CACHE_URL: http://cache_service:8001
      KAFKA_BOOTSTRAP: kafka:9092
      TOPIC_MAIN: consultas_principales
    ports:
      - "8000:8000"
    depends_on:
      cache_service:
        condition: service_healthy
      metrics:
        condition: service_started
      kafka:
        condition: service_healthy
